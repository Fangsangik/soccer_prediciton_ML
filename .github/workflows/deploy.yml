name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install backend deps
        run: |
          cd football-analytics
          pip install fastapi uvicorn duckdb xgboost scikit-learn scipy httpx pydantic pydantic-settings apscheduler

      - name: Backend syntax check
        run: |
          cd football-analytics
          python -c "import ast; import pathlib; [ast.parse(f.read_text()) for f in pathlib.Path('backend').rglob('*.py')]"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Frontend build
        run: |
          cd football-analytics/frontend
          npm ci
          npx tsc --noEmit
          npx vite build

  docker:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./football-analytics
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/football-analytics:latest

